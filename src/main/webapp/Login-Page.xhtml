<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui">
    <h:head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css"/>
        <link rel="stylesheet" href="./style.css"/>

    </h:head>
    <h:body>
        <section class="side">
            <img src="./images/img.svg" alt=""/>
        </section>

        <section class="main">
            <div class="login-container">
                <p class="title">Welcome back</p>
                <div class="separator"></div>
                <p class="welcome-message">Please, provide login credential to proceed and have access to all our services</p>

                <h:form class="login-form">
                    <p:growl id="message"   life="3000"/>
                    <div class="form-control">
                        <p:inputText value="#{usuarioControlador.username}" 
                                     placeholder="Username" required="true"
                                     requiredMessage="this field username is required"
                                     />
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="form-control">
                        <p:password value="#{usuarioControlador.password}" placeholder="Password" required="true"
                                    requiredMessage="this field password is required"
                                    />
                        <i class="fas fa-lock"></i>
                    </div>
                    <div class="signup">Forgot your password?

                        <a href="">Reset your Password</a>
                    </div>

                    <p:commandButton class="submit" value="Login"

                                     action="#{usuarioControlador.validarSesion()}" 
                                     actionListener="#{usuarioControlador.showMessage()}"
                                     update="@form" ajax="true"
                                     >


                    </p:commandButton>




                </h:form>
            </div>
        </section>
    </h:body>
</html>
