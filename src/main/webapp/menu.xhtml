<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
    <h:head>
        <link rel="stylesheet" href="menu-css.css"  type="text/css" />
        <title>Menu</title>
    </h:head>
    <h:body>
        <div class="card">

            <h:form>

                <p:growl id="message"  showDetail="true" life="3000" />

                <p:menubar>
                    <p:submenu label="File" icon="pi pi-fw pi-file">
                        <p:submenu label="New" icon="pi pi-fw pi-plus" >
                            <p:menuitem value="Student" icon="pi pi-fw pi-user-plus" />
                            <p:menuitem value="New Appoitment" icon="pi pi-fw pi-calendar-plus" url="faces/add-student.xhtml"/>
                        </p:submenu>
                        <p:menuitem value="view appointments" icon="pi pi-fw pi-book" url="faces/mostrarDatos.xhtml"/>
                        <p:divider />
                        <p:menuitem value="Export" icon="pi pi-fw pi-external-link"/>
                    </p:submenu>
                    <p:divider layout="vertical"/>


                    <p:submenu label="Users" icon="pi pi-fw pi-user">
                        <p:menuitem value="New" icon="pi pi-fw pi-user-plus"/>
                        <p:menuitem value="Delete" icon="pi pi-fw pi-user-minus"/>
                    </p:submenu>
                    <p:divider layout="vertical"/>


                    <p:submenu label="Events" icon="pi pi-fw pi-calendar">
                        <p:submenu label="Edit" icon="pi pi-fw pi-pencil">
                            <p:menuitem value="Save" icon="pi pi-fw pi-calendar-plus"/>
                            <p:menuitem value="Delete" icon="pi pi-fw pi-calendar-minus"/>
                        </p:submenu>
                        <p:submenu label="Archieve" icon="pi pi-fw pi-calendar-times">
                            <p:menuitem value="Remove" icon="pi pi-fw pi-calendar-minus"/>
                        </p:submenu>
                    </p:submenu>
                    <p:divider layout="vertical"/>

                    <p:divider layout="vertical"/>
                    <p:menuitem value="Home" icon="pi pi-fw pi-home" action="#{usuarioControlador.gotoHome()}">

                    </p:menuitem>

                    <p:divider layout="vertical"/>

                    <p:menuitem value="Welcome:  #{usuarioControlador.usuarioLogueado}" icon="pi pi-fw pi-user">

                    </p:menuitem>

                    <f:facet name="options">

                        <p:commandButton value="Log out" icon="pi pi-fw pi-sign-out" styleClass="ui-button-info"

                                         action="#{usuarioControlador.logout()}"/>
                    </f:facet>

                </p:menubar>

            </h:form>

        </div>
    </h:body>
</html>
