<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
      xmlns:f="http://xmlns.jcp.org/jsf/core"   
      xmlns:p="http://primefaces.org/ui">
    <h:head>
        <link rel="stylesheet" href="menu-css.css"  type="text/css" />
        <title>Facelet Title</title>
        <style type="text/css">



        </style>


        <p:dialog widgetVar="updateData" header="UPDATE APOINTMENT" 
                  modal="true" resizable="false" showEffect="clip">

            <h:form id="data">
                <ui:include src="updateData.xhtml"/>
            </h:form>

        </p:dialog>


    </h:head>
    <h:body>
        <ui:include src="menu.xhtml"/>
        <p:spacer/>

        <div  class="alumnos">

            <h:form id="form">
                <p:growl id="messages" showDetail="true" life="3000"/>
                <div class="card crud-demo">



                    <p:toolbar>
                        <p:toolbarGroup>
                            <p:commandButton value="New" icon="pi pi-plus"
                                             <a href="mostrarDatos.xhtml"></a>
                                             actionListener="#{usuarioControlador.addNewFromDataTable()}"
                                             styleClass="ui-button-success" style="margin-right: .5rem">


                            </p:commandButton>


                        </p:toolbarGroup>
                        <p:toolbarGroup align="right">

                            <p:commandButton value="Export" icon="pi pi-upload" styleClass="ui-button-help" ajax="false">
                                <p:dataExporter type="pdf" target="dt-alumnos" fileName="alumnos"/>
                            </p:commandButton>
                        </p:toolbarGroup>
                    </p:toolbar>
                    <p:spacer/>
                    <p:spacer/>







                    <p:dataTable id="dt-alumnos" widgetVar="dtAlumnos" var="alumno" value="#{alumnoControlador.alumnos}"
                                 reflow="true" styleClass="alumnos-table"
                                 selection="" rowKey="#{alumno.id}" paginator="true"
                                 rows="2" rowSelectMode="add" paginatorPosition="bottom">
                        <f:facet name="header" >
                            <span style="font-weight: bold">APPOINTMENTS</span>
                            <p:spacer/>
                            <div class="alumnos-table-header" align="right">

                                <span class="filter-container ui-input-icon-left" >
                                    <i class="pi pi-search"></i>
                                    <p:inputText id="globalFilter" onkeyup="PF('dtAlumnos').filter()" placeholder="Search"/>
                                </span>

                            </div>
                        </f:facet>








                        <p:column headerText="ID"  filterBy="#{alumno.id}"
                                  filterStyle="#{orgList.showFilter?'':'display: none; visibility: hidden;'}">
                            <h:outputText value="#{alumno.id}"/>
                        </p:column>


                        <p:column headerText="Name" filterBy="#{alumno.nombre}"
                                  filterStyle="#{orgList.showFilter?'':'display: none; visibility: hidden;'}"
                                  >

                            <h:outputText value="#{alumno.nombre}"  />
                        </p:column>

                        <p:column headerText="Last Name" filterBy="#{alumno.apellido}"
                                  filterStyle="#{orgList.showFilter?'':'display: none; visibility: hidden;'}"
                                  >
                            <h:outputText value="#{alumno.apellido}"/>
                        </p:column>


                        <p:column headerText="Age"  filterBy="#{alumno.edad}"
                                  filterStyle="#{orgList.showFilter?'':'display: none; visibility: hidden;'}"
                                  >
                            <h:outputText value="#{alumno.edad}"/>
                        </p:column>


                        <p:column headerText="Date Of Birth" filterBy="#{alumno.fechaNacimiento}"
                                  filterStyle="#{orgList.showFilter?'':'display: none; visibility: hidden;'}"
                                  >
                            <h:outputText value="#{alumno.fechaIngreso}">
                                <f:convertDateTime pattern="MM/dd/yyyy"/>
                            </h:outputText>                    
                        </p:column>  



                        <p:column headerText="Weight"  filterBy="#{alumno.peso}"
                                  filterStyle="#{orgList.showFilter?'':'display: none; visibility: hidden;'}"
                                  >
                            <h:outputText value="#{alumno.peso}"/>
                        </p:column>

                        <p:column headerText="Tall"  filterBy="#{alumno.altura}"
                                  filterStyle="#{orgList.showFilter?'':'display: none; visibility: hidden;'}"
                                  >
                            <h:outputText value="#{alumno.altura}"/>
                        </p:column>



<!--                        <p:column headerText="Family" sortBy="#{alumno.familia}" filterBy="#{alumno.familia}"
                                  filterStyle="#{orgList.showFilter?'':'display: none; visibility: hidden;'}"
                                  >
                            <h:outputText value="#{alumno.familia}" />
                        </p:column>-->


<!--                        <p:column headerText="Sister in Charged" sortBy="#{alumno.madreEncargada}" filterBy="#{alumno.madreEncargada}"
                                   filterStyle="#{orgList.showFilter?'':'display: none; visibility: hidden;'}"
                                  >
                            <h:outputText value="#{alumno.madreEncargada}"/>
                        </p:column>-->


                        <p:column headerText="Grade"  filterBy="#{alumno.grado}"
                                  filterStyle="#{orgList.showFilter?'':'display: none; visibility: hidden;'}"
                                  >
                            <h:outputText value="#{alumno.grado}"/>
                        </p:column>

                        <p:column headerText="Appointment's cause"  filterBy="#{alumno.razonCita}"
                                  filterStyle="#{orgList.showFilter?'':'display: none; visibility: hidden;'}" style="width: 15%"
                                  >
                            <h:outputText value="#{alumno.razonCita}"/>
                        </p:column>





                        <p:column headerText="Date Requested"  filterBy="#{alumno.fechaIngreso}" 
                                  filterStyle="#{orgList.showFilter?'':'display: none; visibility: hidden;'}"
                                  >
                            <h:outputText value="#{alumno.fechaIngreso}">
                                <f:convertDateTime pattern="MM/dd/yyyy"/>
                            </h:outputText>                    
                        </p:column> 






                        <p:column exportable="false">
                            <p:commandButton icon="pi pi-pencil"
                                             update=":data"
                                             oncomplete="PF('updateData').show()"
                                             actionListener="#{alumnoControlador.cargarData(alumno)}"
                                             styleClass="edit-button rounded-button ui-button-success" process="@this">
                            </p:commandButton>

                            <p:commandButton
                                class="ui-button-warning rounded-button" icon="pi pi-trash"
                                update="@this"
                                process="@this"

                                action="#{alumnoControlador.deleteRow(alumno.id)}"

                                >
                                <p:confirm header="Confirmation" message="Delete the selected Student?"
                                           icon="pi pi-exclamation-triangle"/>

                            </p:commandButton>
                        </p:column>
                    </p:dataTable>




                    <p:confirmDialog global="true" showEffect="fade" width="300">
                        <p:commandButton value="Yes" type="button" styleClass="ui-confirmdialog-yes" icon="pi pi-check"/>
                        <p:commandButton value="No" type="button" styleClass="ui-confirmdialog-no ui-button-secondary"
                                         icon="pi pi-times"/>
                    </p:confirmDialog>
                </div>
            </h:form>


        </div>
    </h:body>
</html>
