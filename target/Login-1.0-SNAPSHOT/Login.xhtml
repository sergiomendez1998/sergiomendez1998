<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui">
    <h:head>
        <title>Login Page</title>
    </h:head>
    <h:body style="background-color: lightslategrey">
        <h:form style="margin: 0 auto; width: 30%;
                background-color: black;
                padding-top: 30px;
                margin-top: 50px;
                
                ">

            <p:fieldset legend="Login Page">
                <p:panelGrid columns="2" >
                    <p:outputLabel for="txtUsername" value="Username: "/>
                    <p:inputText id="txtUsername" required="true"/>

                    <p:outputLabel for ="txtPassword" value ="Password: "/>
                    <p:password id="txtPassword" required="true"/>
                    <p:column/>
                    <h:link  value="ir a datos"/>
                    <p:commandButton value="Login" icon="pi pi-sign-in" styleClass="rounded-button"/>
                </p:panelGrid>
            </p:fieldset>

        </h:form>
    </h:body>
</html>
